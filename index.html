<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>제일학원 영어 허브</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2332;--border:#1e2d45;
  --accent:#3b82f6;--accent2:#6366f1;--green:#22c55e;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;--card-radius:20px;
}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:32px 20px 80px;}

.header{text-align:center;padding:48px 0 40px;}
.header-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:100px;padding:6px 16px;font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px;}
.header h1{font-size:clamp(28px,5vw,48px);font-weight:900;line-height:1.1;letter-spacing:-.02em;margin-bottom:12px;}
.header h1 span{background:linear-gradient(135deg,#3b82f6,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header p{color:var(--text2);font-size:15px;}

.mode-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:32px;flex-wrap:wrap;}
.mode-tab{padding:10px 24px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;}
.mode-tab:hover{border-color:var(--accent);color:var(--text);}
.mode-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 20px rgba(59,130,246,.35);}
.mode-tab .dot{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.6;}
.mode-panel{display:none;}.mode-panel.active{display:block;}

.box{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:20px 24px;margin-bottom:24px;}
.section-label{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
.teacher-btns{display:flex;flex-wrap:wrap;gap:8px;}
.teacher-btn{padding:8px 18px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.teacher-btn:hover{border-color:var(--accent2);color:var(--text);}
.teacher-btn.active{background:var(--accent2);border-color:var(--accent2);color:#fff;}

.sort-bar{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
.sort-bar .lbl{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;}
.sort-btn{padding:6px 16px;border-radius:100px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.sort-btn:hover{border-color:var(--accent);color:var(--text);}
.sort-btn.active{background:rgba(59,130,246,.15);border-color:var(--accent);color:var(--accent);}
.edit-btn{margin-left:auto;padding:6px 16px;border-radius:100px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.edit-btn:hover{border-color:var(--accent);color:var(--text);}
.edit-btn.on{background:rgba(59,130,246,.15);border-color:var(--accent);color:var(--accent);}

.group-section{margin-bottom:32px;}
.group-label{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;padding-left:4px;display:flex;align-items:center;gap:8px;}
.group-label::after{content:'';flex:1;height:1px;background:var(--border);}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;align-items:start;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:18px 20px;transition:border-color .25s,transform .25s,box-shadow .25s;overflow:visible;}
.card.clickable{cursor:pointer;}
.card.clickable:hover{border-color:rgba(59,130,246,.4);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4);}
.card-school{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.card-name{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px;}
.card-teacher-row{margin-bottom:14px;min-height:28px;}
.card-teacher{font-size:12px;color:var(--text2);}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.card-grade{font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px;background:rgba(59,130,246,.1);color:var(--accent);border:1px solid rgba(59,130,246,.2);}
.card-go-btn{width:28px;height:28px;border-radius:50%;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:14px;transition:all .2s;}
.card.clickable:hover .card-go-btn{background:var(--accent);color:#fff;border-color:var(--accent);}

/* 마스터 코드 */
.card-code-section{border-top:1px solid var(--border);padding-top:14px;margin-top:14px;}
.card-code-row{display:flex;gap:8px;width:100%;}
.card-code-input{flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;font-weight:700;font-family:'Pretendard',sans-serif;outline:none;transition:border-color .2s;}
.card-code-input:focus{border-color:var(--accent);}
.card-code-input::placeholder{color:var(--text3);font-weight:400;font-size:12px;}
.card-code-btn{padding:10px 12px;border-radius:10px;background:var(--accent);border:none;color:#fff;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Pretendard',sans-serif;transition:background .2s;}
.card-code-btn:hover{background:#2563eb;}
.card-saved-tag{font-size:10px;color:var(--green);font-weight:700;margin-top:8px;display:none;align-items:center;gap:4px;}
.card-saved-tag.show{display:flex;}

/* 선생님 피커 */
.t-picker{position:relative;z-index:10;}
.t-picker-btn{width:100%;display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:13px;font-weight:700;cursor:pointer;transition:border-color .2s;font-family:'Pretendard',sans-serif;}
.t-picker-btn:hover{border-color:var(--accent);}
.t-picker-arrow{font-size:9px;color:var(--text3);transition:transform .2s;}
.t-picker-btn.open .t-picker-arrow{transform:rotate(180deg);}
.t-picker-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);overflow-y:auto;max-height:220px;}
.t-picker-dropdown.open{display:block;}
.t-picker-item{padding:10px 16px;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;transition:background .15s;}
.t-picker-item:hover{background:var(--surface2);color:var(--text);}
.t-picker-item.active{color:var(--accent);background:rgba(59,130,246,.1);}

/* 선생님 관리 */
.teacher-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.teacher-tag{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:100px;background:var(--surface2);border:1px solid var(--border);font-size:13px;font-weight:700;color:var(--text);}
.teacher-tag-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:0;transition:color .2s;}
.teacher-tag-del:hover{color:#ef4444;}
.add-row{display:flex;gap:8px;}
.add-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:13px;font-weight:700;font-family:'Pretendard',sans-serif;outline:none;transition:border-color .2s;}
.add-input:focus{border-color:var(--accent);}
.add-btn{padding:10px 18px;border-radius:10px;background:var(--accent);border:none;color:#fff;font-size:13px;font-weight:800;cursor:pointer;font-family:'Pretendard',sans-serif;}
.add-btn:hover{background:#2563eb;}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:32px;width:320px;transform:scale(.95);transition:transform .25s;}
.modal-overlay.show .modal{transform:scale(1);}
.modal h3{font-size:16px;font-weight:800;margin-bottom:6px;}
.modal p{font-size:13px;color:var(--text2);margin-bottom:20px;}
.modal input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:18px;font-weight:800;font-family:'Pretendard',sans-serif;outline:none;text-align:center;letter-spacing:.2em;margin-bottom:12px;transition:border-color .2s;}
.modal input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:8px;}
.modal-cancel{flex:1;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:14px;font-weight:700;cursor:pointer;font-family:'Pretendard',sans-serif;}
.modal-confirm{flex:2;padding:12px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:'Pretendard',sans-serif;}
.modal-confirm:hover{background:#2563eb;}

.no-cards{text-align:center;padding:48px;color:var(--text3);font-size:14px;}
.footer{text-align:center;padding:40px 0 0;color:var(--text3);font-size:12px;line-height:2;}

/* 데이터 뷰어 모달 */
.data-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.data-modal-overlay.show{opacity:1;pointer-events:all;}
.data-modal{background:var(--surface);border:1px solid var(--border);border-radius:24px;width:min(900px,96vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden;}
.data-modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.data-modal-header h2{font-size:15px;font-weight:800;color:var(--text);}
.data-modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:0;line-height:1;font-family:'Pretendard',sans-serif;}
.data-modal-body{display:flex;flex:1;overflow:hidden;}
/* 반 목록 사이드 */
.data-class-list{width:160px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;padding:8px 6px;}
/* 모바일: 세로 레이아웃 */
@media(max-width:600px){
  .data-modal{border-radius:20px 20px 0 0;width:100%;max-height:92vh;position:fixed;bottom:0;left:0;}
  .data-modal-overlay{align-items:flex-end;}
  .data-modal-body{flex-direction:column;}
  .data-class-list{width:100%;height:auto;max-height:120px;border-right:none;border-bottom:1px solid var(--border);display:flex;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;padding:8px;gap:6px;flex-direction:row;}
  .data-class-item{white-space:nowrap;flex-shrink:0;padding:6px 12px;}
  .data-class-item .item-school{display:none;}
  .data-content{flex:1;overflow-y:auto;padding:16px;}
}
.data-class-item{padding:10px 12px;border-radius:12px;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .15s;margin-bottom:2px;}
.data-class-item:hover{background:var(--surface2);color:var(--text);}
.data-class-item.active{background:rgba(59,130,246,.15);color:var(--accent);border:1px solid rgba(59,130,246,.2);}
.data-class-item .item-school{font-size:10px;color:var(--text3);margin-bottom:2px;}
/* 데이터 콘텐츠 */
.data-content{flex:1;overflow-y:auto;padding:20px 24px;}
.data-loading{text-align:center;padding:40px;color:var(--text2);font-size:14px;}
.data-empty{text-align:center;padding:40px;color:var(--text3);font-size:13px;}
/* 진도 현황 */
.progress-overall{background:var(--surface2);border-radius:16px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;}
.progress-overall-pct{font-size:28px;font-weight:900;color:var(--green);flex-shrink:0;}
.progress-bar-wrap{flex:1;}
.progress-bar-label{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px;}
.progress-bar-bg{height:8px;background:var(--border);border-radius:100px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--green);border-radius:100px;transition:width .5s;}
.subject-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px;}
.subject-card{background:var(--surface2);border-radius:12px;padding:12px 14px;}
.subject-card-name{font-size:11px;font-weight:800;color:var(--text2);margin-bottom:6px;}
.subject-card-pct{font-size:18px;font-weight:900;color:var(--accent);margin-bottom:4px;}
.subject-card-bar{height:4px;background:var(--border);border-radius:100px;overflow:hidden;}
.subject-card-bar-fill{height:100%;background:var(--accent);border-radius:100px;}
.subject-card-sub{font-size:10px;color:var(--text3);margin-top:4px;}
.plan-list{display:flex;flex-direction:column;gap:6px;}
.plan-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border-radius:10px;}
.plan-date{font-size:10px;font-weight:700;color:var(--text3);width:80px;flex-shrink:0;}
.plan-type{font-size:9px;font-weight:800;padding:2px 6px;border-radius:6px;background:rgba(59,130,246,.15);color:var(--accent);flex-shrink:0;}
.plan-subject{font-size:10px;font-weight:700;color:var(--text3);flex-shrink:0;}
.plan-unit{font-size:12px;font-weight:700;color:var(--text);flex:1;}
.plan-done{font-size:10px;color:var(--green);flex-shrink:0;}
/* 성적표 */
.score-table{width:100%;border-collapse:collapse;font-size:12px;}
.score-table th{padding:8px 12px;text-align:left;font-weight:800;color:var(--text3);border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.06em;}
.score-table td{padding:10px 12px;border-bottom:1px solid var(--border);}
.score-table tr:hover td{background:var(--surface2);}
.score-badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:800;}

/* 퀵버튼 */
.quick-btns{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.quick-btn{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.quick-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,.05);}
.quick-btn .qicon{font-size:16px;}
@media(max-width:600px){.cards{grid-template-columns:1fr 1fr;}}
@media(max-width:400px){.cards{grid-template-columns:1fr;}}
</style>
<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-badge">🎓 제일학원</div>
    <h1>영어 <span>허브 사이트</span></h1>
    <p>모든 반의 영어 학습 관리 시스템에 접속하세요</p>
  </div>

  <div class="mode-tabs">
    <div class="mode-tab active" id="tab-manager"><span class="dot"></span>실장용</div>
    <div class="mode-tab" id="tab-teacher"><span class="dot"></span>담당 선생님용</div>
    <div class="mode-tab" id="tab-master"><span class="dot"></span>마스터용</div>
  </div>

  <div class="mode-panel active" id="panel-manager">
    <div class="quick-btns">
      <button type="button" class="quick-btn" id="btn-progress">
        <span class="qicon">📊</span> 진도 현황
      </button>
      <button type="button" class="quick-btn" id="btn-scores">
        <span class="qicon">🏆</span> 시험 성적표
      </button>
    </div>
    <div class="sort-bar">
      <span class="lbl">분류</span>
      <div class="sort-btn active" id="mg-grade">학년별</div>
      <div class="sort-btn" id="mg-teacher">선생님별</div>
    </div>
    <div id="manager-cards"></div>
  </div>

  <div class="mode-panel" id="panel-teacher">
    <div class="box">
      <div class="section-label">선생님 선택</div>
      <div class="teacher-btns" id="teacher-btns"></div>
    </div>
    <div class="sort-bar">
      <span class="lbl">분류</span>
      <div class="sort-btn active" id="tc-grade">학년별</div>
      <div class="sort-btn" id="tc-teacher">선생님별</div>
    </div>
    <div id="teacher-cards"></div>
  </div>

  <div class="mode-panel" id="panel-master">
    <div class="box" id="manage-panel" style="display:none;">
      <div class="section-label">선생님 관리</div>
      <div class="teacher-list" id="teacher-manage-list"></div>
      <div class="add-row">
        <input class="add-input" id="add-teacher-input" placeholder="선생님 이름 입력" maxlength="10"/>
        <button class="add-btn" id="add-teacher-btn">추가</button>
      </div>
    </div>
    <div class="sort-bar">
      <span class="lbl">분류</span>
      <div class="sort-btn active" id="ms-grade">학년별</div>
      <div class="sort-btn" id="ms-teacher">선생님별</div>
      <div class="edit-btn" id="edit-toggle">✏️ 편집</div>
    </div>
    <div id="master-cards"></div>
  </div>

  <div class="footer">제일학원 영어 LMS · 선생님 코드: 26350</div>
</div>

<div class="modal-overlay" id="code-modal">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <p>마스터 코드를 입력하세요</p>
    <input type="password" id="modal-input" placeholder="코드 입력" maxlength="20"/>
    <div class="modal-btns">
      <button class="modal-cancel" id="modal-cancel-btn">취소</button>
      <button class="modal-confirm" id="modal-confirm-btn">접속 →</button>
    </div>
  </div>
</div>

<!-- 데이터 뷰어 모달 -->
<div class="data-modal-overlay" id="data-modal">
  <div class="data-modal">
    <div class="data-modal-header">
      <h2 id="data-modal-title">진도 현황</h2>
      <button type="button" class="data-modal-close" id="data-modal-close">×</button>
    </div>
    <div class="data-modal-body">
      <div class="data-class-list" id="data-class-list"></div>
      <div class="data-content" id="data-content">
        <div class="data-empty">왼쪽에서 반을 선택하세요</div>
      </div>
    </div>
  </div>
</div>

<script>
var BASE_URL = 'https://lllllddd5162.github.io/';
var TEACHER_CODE = '26350';
var LS_KEY = 'jeil_hub_v3';

var DEFAULT_CLASSES = [
  {name:'성동고 1S반',school:'성동고',grade:1,teacher:'박동혁',appId:'Jeil-english-Seongdong-grade1S'},
  {name:'성동고 1H반',school:'성동고',grade:1,teacher:'최주성',appId:'Jeil-english-Seongdong-grade1H'},
  {name:'성동고 2S반',school:'성동고',grade:2,teacher:'박동혁',appId:'Jeil-english-Seongdong-grade2S'},

// --- SORT / GROUP ---
function sortList(list, type) {
  return list.slice().sort(function(a,b){
    if (type==='grade') {
      if (a.grade!==b.grade) return a.grade-b.grade;
      var sc = a.school.localeCompare(b.school,'ko');
      if (sc!==0) return sc;
      return (a.name.includes('S')?0:a.name.includes('H')?1:2)-(b.name.includes('S')?0:b.name.includes('H')?1:2);
    }
    var tc = a.teacher.localeCompare(b.teacher,'ko');
    return tc || a.grade-b.grade || a.school.localeCompare(b.school,'ko');
  });
}
function groupBy(list, type) {
  var res = {};
  if (type==='grade') {
    [1,2,3].forEach(function(g){
      var items = sortList(list.filter(function(c){return c.grade===g;}), type);
      if (items.length) res[g+'학년'] = items;
    });
  } else {
    var ts = [];
    list.forEach(function(c){ if (ts.indexOf(c.teacher)<0) ts.push(c.teacher); });
    ts.sort(function(a,b){return a.localeCompare(b,'ko');});
    ts.forEach(function(t){
      var items = sortList(list.filter(function(c){return c.teacher===t;}), type);
      if (items.length) res[t+' 선생님'] = items;
    });
  }
  return res;
}

function renderProgressData(plans, c) {
  _cachedProgress = {plans:plans, c:c};
  var content = document.getElementById('data-content');
  if (!plans.length) { content.innerHTML = '<div class="data-empty">등록된 진도 계획이 없습니다.</div>'; return; }

  var jinDo = plans.filter(function(p){ return !p.lessonType || p.lessonType==='진도'; });
  var done = jinDo.filter(function(p){ return p.done; }).length;
  var remaining = jinDo.length - done;
  var pct = jinDo.length ? Math.round(done/jinDo.length*100) : 0;

  // 진도 종료 예상일 계산
  // 최근 완료된 수업들의 날짜 간격 평균으로 계산
  var estimatedEnd = '-';
  var doneDates = jinDo.filter(function(p){return p.done&&p.date;}).map(function(p){return p.date;}).sort();
  if (doneDates.length >= 2 && remaining > 0) {
    // 최근 7개 완료 수업의 날짜 기준 평균 주기 계산
    var recent = doneDates.slice(-7);
    var first = new Date(recent[0]);
    var last = new Date(recent[recent.length-1]);
    var daySpan = (last-first)/(1000*60*60*24);
    var avgInterval = daySpan / (recent.length-1); // 수업 간 평균 일수
    if (avgInterval > 0) {
      var today = new Date();
      var lastDate = new Date(doneDates[doneDates.length-1]);
      var baseDate = lastDate > today ? lastDate : today;
      var estMs = baseDate.getTime() + (remaining * avgInterval * 1000*60*60*24);
      var estDate = new Date(estMs);
      estimatedEnd = estDate.getFullYear()+'.'+(estDate.getMonth()+1)+'.'+estDate.getDate();
    }
  } else if (remaining === 0) {
    estimatedEnd = '완료';
  }

  // 과목별 통계
  var subjectMap = {};
  jinDo.forEach(function(p){
    var sub = p.subject || '미분류';
    if (!subjectMap[sub]) subjectMap[sub] = {total:0,done:0};
    subjectMap[sub].total++;
    if (p.done) subjectMap[sub].done++;
  });

  // 과목 필터
  var allSubjects = [];
  jinDo.forEach(function(p){ var s=p.subject||'미분류'; if(allSubjects.indexOf(s)<0) allSubjects.push(s); });
  var contentEl2 = document.getElementById('data-content');
  var activeSub = contentEl2.dataset.subFilter || 'all';
  var filteredJinDo = activeSub==='all' ? jinDo : jinDo.filter(function(p){return (p.subject||'미분류')===activeSub;});
  var filteredPlans = activeSub==='all' ? plans : plans.filter(function(p){return (p.subject||'미분류')===activeSub;});

  var html = '<h3 style="font-size:13px;font-weight:800;color:var(--text2);margin-bottom:10px;">'+c.name+' 진도 현황</h3>';

  // 과목 필터 탭
  if (allSubjects.length > 1) {
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">';
    ['all'].concat(allSubjects).forEach(function(sub){
      var active = activeSub===sub;
      html += '<button class="prog-sub-btn" data-sub="'+sub+'" style="padding:5px 14px;border-radius:100px;border:1px solid '+(active?'var(--accent)':'var(--border)')+';background:'+(active?'rgba(59,130,246,.15)':'var(--surface2)')+';color:'+(active?'var(--accent)':'var(--text2)')+';font-size:11px;font-weight:700;cursor:pointer;">'+(sub==='all'?'전체':sub)+'</button>';
    });
    html += '</div>';
  }

  // 필터 적용된 통계 재계산
  var done = filteredJinDo.filter(function(p){return p.done;}).length;
  var remaining = filteredJinDo.length - done;
  var pct = filteredJinDo.length ? Math.round(done/filteredJinDo.length*100) : 0;

  // 전체 진도율 + 종료 예상일
  html += '<div class="progress-overall" style="flex-wrap:wrap;gap:12px;">' +
    '<div class="progress-overall-pct">'+pct+'%</div>' +
    '<div class="progress-bar-wrap" style="min-width:120px;">' +
      '<div class="progress-bar-label">전체 진도율 · '+done+'/'+jinDo.length+'건 완료</div>' +
      '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+pct+'%"></div></div>' +
    '</div>' +
    '<div style="background:var(--surface2);border-radius:12px;padding:10px 14px;flex-shrink:0;">' +
      '<div style="font-size:10px;font-weight:800;color:var(--text3);margin-bottom:4px;">📅 종료 예상일</div>' +
      '<div style="font-size:15px;font-weight:900;color:'+(estimatedEnd==='완료'?'var(--green)':'var(--accent)')+';">'+estimatedEnd+'</div>' +
      (remaining>0?'<div style="font-size:10px;color:var(--text3);margin-top:2px;">잔여 '+remaining+'건</div>':'') +
    '</div>' +
  '</div>';

  // 과목별
  var subKeys = Object.keys(subjectMap);
  if (subKeys.length) {
    html += '<div class="subject-grid" style="grid-template-columns:repeat(auto-fill,minmax(120px,1fr));">';
    subKeys.forEach(function(sub){
      var s = subjectMap[sub];
      var sp = Math.round(s.done/s.total*100);
      html += '<div class="subject-card">' +
        '<div class="subject-card-name">'+sub+'</div>' +
        '<div class="subject-card-pct">'+sp+'%</div>' +
        '<div class="subject-card-bar"><div class="subject-card-bar-fill" style="width:'+sp+'%"></div></div>' +
        '<div class="subject-card-sub">'+s.done+'/'+s.total+' 완료</div>' +
      '</div>';
    });
    html += '</div>';
  }

  // 최근 진도 목록 - 모바일 친화적
  var sorted = filteredPlans.slice().sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
  html += '<p style="font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">수업 기록</p>';
  html += '<div class="plan-list">';
  sorted.slice(0,30).forEach(function(p){
    html += '<div class="plan-item" style="flex-wrap:wrap;gap:4px;">' +
      '<span class="plan-date" style="font-size:11px;">'+(p.date||'-')+'</span>' +
      '<span class="plan-type">'+(p.lessonType||'진도')+'</span>' +
      (p.subject ? '<span class="plan-subject">'+p.subject+'</span>' : '') +
      '<span class="plan-unit" style="width:100%;font-size:12px;">'+(p.unit||'-')+'</span>' +
      (p.done ? '<span class="plan-done">✓ 완료</span>' : '<span style="font-size:10px;color:var(--text3);">미완료</span>') +
    '</div>';
  });
  html += '</div>';
  content.innerHTML = html;
}

var _cachedProgress = null;

// progressSubFilter -> 이벤트 위임으로 처리

// 열린 시험 카드 ID
var openTestId = null;
var _cachedScores = null;

// scoreTypeFilter -> 이벤트 위임으로 처리

// toggleTestCard -> 이벤트 위임으로 처리

function renderScoresData(tests, students, scores, c) {
  var el = document.getElementById('data-content');
  if (!tests.length) { el.innerHTML = '<div class="data-empty">등록된 시험이 없습니다.</div>'; return; }
  _cachedScores = {tests:tests, students:students, scores:scores, c:c};

  var sortedStudents = students.slice().sort(function(a,b){ return (a.sortOrder||0)-(b.sortOrder||0)||a.name.localeCompare(b.name,'ko'); });
  var sortedTests = tests.slice().sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });

  var types = [];
  sortedTests.forEach(function(t){ var tp=t.testType||'중간 테스트'; if(types.indexOf(tp)<0) types.push(tp); });
  var activeType = el.dataset.typeFilter || 'all';
  var filteredTests = activeType==='all' ? sortedTests : sortedTests.filter(function(t){ return (t.testType||'중간 테스트')===activeType; });

  var html = '<h3 style="font-size:13px;font-weight:800;color:var(--text2);margin-bottom:10px;">'+c.name+' 시험 성적표</h3>';

  // 시험 유형 필터
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">';
  ['all'].concat(types).forEach(function(tp){
    var active = activeType===tp;
    html += '<button class="score-type-btn" data-type="'+tp+'" style="padding:5px 14px;border-radius:100px;border:1px solid '+(active?'var(--accent)':'var(--border)')+';background:'+(active?'rgba(59,130,246,.15)':'var(--surface2)')+';color:'+(active?'var(--accent)':'var(--text2)')+';font-size:11px;font-weight:700;cursor:pointer;">'+(tp==='all'?'전체':tp)+'</button>';
  });
  html += '</div>';

  if (!filteredTests.length) { el.innerHTML = html + '<div class="data-empty">해당 유형 시험 없음</div>'; return; }

  filteredTests.forEach(function(t){
    var validScores = sortedStudents.map(function(s){
      var r=scores[s.id+'-'+t.id]||{};
      return r.absent?null:(r.score!=null?parseFloat(r.score):null);
    }).filter(function(v){return v!=null&&!isNaN(v);});
    var avg = validScores.length ? validScores.reduce(function(a,b){return a+b;},0)/validScores.length : null;
    var isOpen = openTestId===t.id;

    html += '<div style="background:var(--surface2);border-radius:16px;margin-bottom:10px;overflow:hidden;">';
    // 헤더
    html += '<div class="test-card-header" data-tid="'+t.id+'" style="padding:14px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;">' +
      '<div style="flex:1;min-width:0;">' +
        '<div style="font-size:14px;font-weight:800;color:var(--text);">'+t.title+'</div>' +
        '<div style="font-size:10px;color:var(--text3);margin-top:2px;">'+t.date+(t.maxScore?' · 만점 '+t.maxScore+'점':'')+(t.testType?' · '+t.testType:'')+'</div>' +
        '<div style="font-size:11px;font-weight:700;color:var(--accent);margin-top:3px;">반 평균 '+(avg!=null?avg.toFixed(1)+'점':'데이터 없음')+(validScores.length?' · '+validScores.length+'명':'')+'</div>' +
      '</div>' +
      '<span style="color:var(--text3);font-size:16px;flex-shrink:0;">'+(isOpen?'▲':'▼')+'</span>' +
    '</div>';

    if (isOpen) {
      var sortedByScore = sortedStudents.filter(function(s){
        var r=scores[s.id+'-'+t.id]||{};
        return !r.absent&&r.score!=null&&!isNaN(parseFloat(r.score));
      }).slice().sort(function(a,b){
        return parseFloat(scores[b.id+'-'+t.id].score)-parseFloat(scores[a.id+'-'+t.id].score);
      });

      html += '<div style="border-top:1px solid var(--border);">';
      sortedStudents.forEach(function(s){
        var r=scores[s.id+'-'+t.id]||{};
        var score = r.absent?null:(r.score!=null?parseFloat(r.score):null);
        var rank = score!=null ? sortedByScore.findIndex(function(x){return x.id===s.id;})+1 : null;
        var diff = (score!=null&&avg!=null) ? score-avg : null;
        var pct = (score!=null&&t.maxScore) ? Math.round(score/parseFloat(t.maxScore)*100) : null;

        html += '<div style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);">';
        // 등수 뱃지
        if (rank) {
          var rankBg = rank===1?'#f59e0b':rank===2?'#94a3b8':rank===3?'#b45309':'var(--surface)';
          html += '<div style="width:26px;height:26px;border-radius:50%;background:'+rankBg+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;flex-shrink:0;">'+rank+'</div>';
        } else {
          html += '<div style="width:26px;height:26px;flex-shrink:0;"></div>';
        }
        html += '<div style="flex:1;min-width:0;font-size:13px;font-weight:800;color:var(--text);">'+s.name+'</div>';

        if (r.absent==='absent') {
          html += '<span style="font-size:11px;font-weight:800;color:#ef4444;">결시</span>';
        } else if (r.absent==='excluded') {
          html += '<span style="font-size:11px;color:var(--text3);">비대상</span>';
        } else if (score!=null) {
          html += '<div style="text-align:right;">' +
            '<div style="font-size:15px;font-weight:900;color:var(--text);">'+score+'점'+(pct!=null?' <span style="font-size:10px;color:var(--text3);">('+pct+'%)</span>':'')+'</div>' +
            (diff!=null?'<div style="font-size:11px;font-weight:700;color:'+(diff>0?'#22c55e':diff<0?'#ef4444':'var(--text3)')+';">'+(diff>0?'+':'')+diff.toFixed(1)+'점 (평균 대비)</div>':'') +
          '</div>';
        } else {
          html += '<span style="font-size:11px;color:var(--text3);">미입력</span>';
        }
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  });

  el.innerHTML = html;
}

// 이벤트
document.getElementById('btn-progress').addEventListener('click', function(){
  dataModalMode = 'progress';
  dataSelectedClass = null;
  document.getElementById('data-modal-title').textContent = '📊 진도 현황';
  renderDataClassList();
  document.getElementById('data-content').innerHTML = '<div class="data-empty">왼쪽에서 반을 선택하세요</div>';
  document.getElementById('data-modal').classList.add('show');
});
document.getElementById('btn-scores').addEventListener('click', function(){
  dataModalMode = 'scores';
  dataSelectedClass = null;
  document.getElementById('data-modal-title').textContent = '🏆 시험 성적표';
  renderDataClassList();
  document.getElementById('data-content').innerHTML = '<div class="data-empty">왼쪽에서 반을 선택하세요</div>';
  document.getElementById('data-modal').classList.add('show');
});
document.getElementById('data-modal-close').addEventListener('click', function(){
  document.getElementById('data-modal').classList.remove('show');
});
document.getElementById('data-modal').addEventListener('click', function(e){
  if (e.target===this) this.classList.remove('show');
});
document.getElementById('data-class-list').addEventListener('click', function(e){
  var item = e.target.closest('.data-class-item');
  if (!item) return;
  var appId = item.dataset.appid;
  dataSelectedClass = CLASSES.find(function(c){ return c.appId===appId; });
  renderDataClassList();
  if (dataSelectedClass) loadClassData(dataSelectedClass);
});

window.addEventListener('load', function(){
  if (typeof firebase !== 'undefined') fbConnect();
});
