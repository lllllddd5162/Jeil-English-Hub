<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>제일학원 영어 허브</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0e1a;--surface:#111827;--surface2:#1a2332;--border:#1e2d45;
  --accent:#3b82f6;--accent2:#6366f1;--green:#22c55e;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;--card-radius:20px;
}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:32px 20px 80px;}

.header{text-align:center;padding:48px 0 40px;}
.header-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);border-radius:100px;padding:6px 16px;font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.08em;text-transform:uppercase;margin-bottom:20px;}
.header h1{font-size:clamp(28px,5vw,48px);font-weight:900;line-height:1.1;letter-spacing:-.02em;margin-bottom:12px;}
.header h1 span{background:linear-gradient(135deg,#3b82f6,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header p{color:var(--text2);font-size:15px;}

.mode-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:32px;flex-wrap:wrap;}
.mode-tab{padding:10px 24px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;}
.mode-tab:hover{border-color:var(--accent);color:var(--text);}
.mode-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 20px rgba(59,130,246,.35);}
.mode-tab .dot{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.6;}
.mode-panel{display:none;}.mode-panel.active{display:block;}

.box{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:20px 24px;margin-bottom:24px;}
.section-label{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
.teacher-btns{display:flex;flex-wrap:wrap;gap:8px;}
.teacher-btn{padding:8px 18px;border-radius:100px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text2);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.teacher-btn:hover{border-color:var(--accent2);color:var(--text);}
.teacher-btn.active{background:var(--accent2);border-color:var(--accent2);color:#fff;}

.sort-bar{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
.sort-bar .lbl{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;}
.sort-btn{padding:6px 16px;border-radius:100px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.sort-btn:hover{border-color:var(--accent);color:var(--text);}
.sort-btn.active{background:rgba(59,130,246,.15);border-color:var(--accent);color:var(--accent);}
.edit-btn{margin-left:auto;padding:6px 16px;border-radius:100px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.edit-btn:hover{border-color:var(--accent);color:var(--text);}
.edit-btn.on{background:rgba(59,130,246,.15);border-color:var(--accent);color:var(--accent);}

.group-section{margin-bottom:32px;}
.group-label{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;padding-left:4px;display:flex;align-items:center;gap:8px;}
.group-label::after{content:'';flex:1;height:1px;background:var(--border);}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;align-items:start;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:18px 20px;transition:border-color .25s,transform .25s,box-shadow .25s;overflow:visible;}
.card.clickable{cursor:pointer;}
.card.clickable:hover{border-color:rgba(59,130,246,.4);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4);}
.card-school{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.card-name{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px;}
.card-teacher-row{margin-bottom:14px;min-height:28px;}
.card-teacher{font-size:12px;color:var(--text2);}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.card-grade{font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px;background:rgba(59,130,246,.1);color:var(--accent);border:1px solid rgba(59,130,246,.2);}
.card-go-btn{width:28px;height:28px;border-radius:50%;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:14px;transition:all .2s;}
.card.clickable:hover .card-go-btn{background:var(--accent);color:#fff;border-color:var(--accent);}

/* 마스터 코드 */
.card-code-section{border-top:1px solid var(--border);padding-top:14px;margin-top:14px;}
.card-code-row{display:flex;gap:8px;width:100%;}
.card-code-input{flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:13px;font-weight:700;font-family:'Pretendard',sans-serif;outline:none;transition:border-color .2s;}
.card-code-input:focus{border-color:var(--accent);}
.card-code-input::placeholder{color:var(--text3);font-weight:400;font-size:12px;}
.card-code-btn{padding:10px 12px;border-radius:10px;background:var(--accent);border:none;color:#fff;font-size:12px;font-weight:800;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Pretendard',sans-serif;transition:background .2s;}
.card-code-btn:hover{background:#2563eb;}
.card-saved-tag{font-size:10px;color:var(--green);font-weight:700;margin-top:8px;display:none;align-items:center;gap:4px;}
.card-saved-tag.show{display:flex;}

/* 선생님 피커 */
.t-picker{position:relative;z-index:10;}
.t-picker-btn{width:100%;display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 12px;color:var(--text);font-size:13px;font-weight:700;cursor:pointer;transition:border-color .2s;font-family:'Pretendard',sans-serif;}
.t-picker-btn:hover{border-color:var(--accent);}
.t-picker-arrow{font-size:9px;color:var(--text3);transition:transform .2s;}
.t-picker-btn.open .t-picker-arrow{transform:rotate(180deg);}
.t-picker-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);overflow-y:auto;max-height:220px;}
.t-picker-dropdown.open{display:block;}
.t-picker-item{padding:10px 16px;font-size:13px;font-weight:700;color:var(--text2);cursor:pointer;transition:background .15s;}
.t-picker-item:hover{background:var(--surface2);color:var(--text);}
.t-picker-item.active{color:var(--accent);background:rgba(59,130,246,.1);}

/* 선생님 관리 */
.teacher-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.teacher-tag{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:100px;background:var(--surface2);border:1px solid var(--border);font-size:13px;font-weight:700;color:var(--text);}
.teacher-tag-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:0;transition:color .2s;}
.teacher-tag-del:hover{color:#ef4444;}
.add-row{display:flex;gap:8px;}
.add-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:13px;font-weight:700;font-family:'Pretendard',sans-serif;outline:none;transition:border-color .2s;}
.add-input:focus{border-color:var(--accent);}
.add-btn{padding:10px 18px;border-radius:10px;background:var(--accent);border:none;color:#fff;font-size:13px;font-weight:800;cursor:pointer;font-family:'Pretendard',sans-serif;}
.add-btn:hover{background:#2563eb;}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.show{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:32px;width:320px;transform:scale(.95);transition:transform .25s;}
.modal-overlay.show .modal{transform:scale(1);}
.modal h3{font-size:16px;font-weight:800;margin-bottom:6px;}
.modal p{font-size:13px;color:var(--text2);margin-bottom:20px;}
.modal input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:18px;font-weight:800;font-family:'Pretendard',sans-serif;outline:none;text-align:center;letter-spacing:.2em;margin-bottom:12px;transition:border-color .2s;}
.modal input:focus{border-color:var(--accent);}
.modal-btns{display:flex;gap:8px;}
.modal-cancel{flex:1;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:14px;font-weight:700;cursor:pointer;font-family:'Pretendard',sans-serif;}
.modal-confirm{flex:2;padding:12px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:'Pretendard',sans-serif;}
.modal-confirm:hover{background:#2563eb;}

.no-cards{text-align:center;padding:48px;color:var(--text3);font-size:14px;}
.footer{text-align:center;padding:40px 0 0;color:var(--text3);font-size:12px;line-height:2;}
@media(max-width:600px){.cards{grid-template-columns:1fr 1fr;}}
@media(max-width:400px){.cards{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-badge">🎓 제일학원</div>
    <h1>영어 <span>허브 사이트</span></h1>
    <p>모든 반의 영어 학습 관리 시스템에 접속하세요</p>
  </div>

  <div class="mode-tabs">
    <div class="mode-tab active" id="tab-manager"><span class="dot"></span>실장용</div>
    <div class="mode-tab" id="tab-teacher"><span class="dot"></span>담당 선생님용</div>
    <div class="mode-tab" id="tab-master"><span class="dot"></span>마스터용</div>
  </div>

  <div class="mode-panel active" id="panel-manager">
    <div class="sort-bar">
      <span class="lbl">분류</span>
      <div class="sort-btn active" id="mg-grade">학년별</div>
      <div class="sort-btn" id="mg-teacher">선생님별</div>
    </div>
    <div id="manager-cards"></div>
  </div>

  <div class="mode-panel" id="panel-teacher">
    <div class="box">
      <div class="section-label">선생님 선택</div>
      <div class="teacher-btns" id="teacher-btns"></div>
    </div>
    <div class="sort-bar">
      <span class="lbl">분류</span>
      <div class="sort-btn active" id="tc-grade">학년별</div>
      <div class="sort-btn" id="tc-teacher">선생님별</div>
    </div>
    <div id="teacher-cards"></div>
  </div>

  <div class="mode-panel" id="panel-master">
    <div class="box" id="manage-panel" style="display:none;">
      <div class="section-label">선생님 관리</div>
      <div class="teacher-list" id="teacher-manage-list"></div>
      <div class="add-row">
        <input class="add-input" id="add-teacher-input" placeholder="선생님 이름 입력" maxlength="10"/>
        <button class="add-btn" id="add-teacher-btn">추가</button>
      </div>
    </div>
    <div class="sort-bar">
      <span class="lbl">분류</span>
      <div class="sort-btn active" id="ms-grade">학년별</div>
      <div class="sort-btn" id="ms-teacher">선생님별</div>
      <div class="edit-btn" id="edit-toggle">✏️ 편집</div>
    </div>
    <div id="master-cards"></div>
  </div>

  <div class="footer">제일학원 영어 LMS · 선생님 코드: 26350</div>
</div>

<div class="modal-overlay" id="code-modal">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <p>마스터 코드를 입력하세요</p>
    <input type="password" id="modal-input" placeholder="코드 입력" maxlength="20"/>
    <div class="modal-btns">
      <button class="modal-cancel" id="modal-cancel-btn">취소</button>
      <button class="modal-confirm" id="modal-confirm-btn">접속 →</button>
    </div>
  </div>
</div>

<script>
var BASE_URL = 'https://lllllddd5162.github.io/';
var TEACHER_CODE = '26350';
var LS_KEY = 'jeil_hub_v3';

var DEFAULT_CLASSES = [
  {name:'성동고 1S반',school:'성동고',grade:1,teacher:'박동혁',appId:'Jeil-english-Seongdong-grade1S'},
  {name:'성동고 1H반',school:'성동고',grade:1,teacher:'최주성',appId:'Jeil-english-Seongdong-grade1H'},
  {name:'성동고 2S반',school:'성동고',grade:2,teacher:'박동혁',appId:'Jeil-english-Seongdong-grade2S'},
  {name:'성동고 2H반',school:'성동고',grade:2,teacher:'장지호',appId:'Jeil-english-Seongdong-grade2H'},
  {name:'성동고 3S반',school:'성동고',grade:3,teacher:'장지호',appId:'Jeil-english-Seongdong-grade3S'},
  {name:'성동고 3H반',school:'성동고',grade:3,teacher:'장지호',appId:'Jeil-english-Seongdong-grade3H'},
  {name:'성수고 1학년',school:'성수고',grade:1,teacher:'박민우',appId:'Jeil-english-Seongsoo-grade1'},
  {name:'성수고 2학년',school:'성수고',grade:2,teacher:'박동혁',appId:'Jeil-english-Seongsoo-grade2'},
  {name:'성수고 3학년',school:'성수고',grade:3,teacher:'신채리',appId:'Jeil-english-Seongsoo-grade3'},
  {name:'금호고 1학년',school:'금호고',grade:1,teacher:'박동혁',appId:'Jeil-english-Geumo-grade1'},
  {name:'금호고 2학년',school:'금호고',grade:2,teacher:'이성규',appId:'Jeil-english-Geumo-grade2'},
  {name:'금호고 3학년',school:'금호고',grade:3,teacher:'장지호',appId:'Jeil-english-Geumo-grade3'},
  {name:'도선고 1학년',school:'도선고',grade:1,teacher:'최주성',appId:'Jeil-english-Dosun-grade1'},
  {name:'도선고 2학년',school:'도선고',grade:2,teacher:'박민우',appId:'Jeil-english-Dosun-grade2'},
  {name:'도선고 3학년',school:'도선고',grade:3,teacher:'신채리',appId:'Jeil-english-Dosun-grade3'},
  {name:'무학여고 1학년',school:'무학여고',grade:1,teacher:'이성규',appId:'Jeil-english-Muhak-grade1'},
  {name:'무학여고 2학년',school:'무학여고',grade:2,teacher:'박민우',appId:'Jeil-english-Muhak-grade2'},
  {name:'경일고 1학년',school:'경일고',grade:1,teacher:'이성규',appId:'Jeil-english-Kyungil-grade1'},
];
var DEFAULT_TEACHERS = ['박동혁','박민우','신채리','이성규','장지호','최주성'];

// --- STATE ---
function loadState() {
  try {
    var s = localStorage.getItem(LS_KEY);
    if (s) { var d = JSON.parse(s); return {classes:d.classes||DEFAULT_CLASSES,teachers:d.teachers||DEFAULT_TEACHERS,masterCodes:d.masterCodes||{}}; }
  } catch(e) {}
  return {classes:DEFAULT_CLASSES,teachers:DEFAULT_TEACHERS,masterCodes:{}};
}
function saveState() {
  try { localStorage.setItem(LS_KEY,JSON.stringify({classes:CLASSES,teachers:TEACHERS,masterCodes:masterCodes})); } catch(e) {}
  fbSave();
}

var st = loadState();
var CLASSES = st.classes;
var TEACHERS = st.teachers;
var masterCodes = st.masterCodes;
var currentMode = 'manager';
var sortState = {manager:'grade',teacher:'grade',master:'grade'};
var selectedTeacher = null;
var editMode = false;
var modalTarget = null;
var openPickerAppId = null;

// --- FIREBASE (백그라운드) ---
var db = null;
var FB_PATH = 'artifacts/Jeil-english-Seongdong-grade1S/public/data/hub/config';
function fbSave() {
  if (!db) return;
  try { db.doc(FB_PATH).set({classes:CLASSES,teachers:TEACHERS,masterCodes:masterCodes},{merge:true}).catch(function(){}); } catch(e) {}
}
function fbConnect() {
  try {
    var FB = {apiKey:'AIzaSyBaWWriu3X7iVQnglR5XcA0Mqqc736VopM',authDomain:'science-academy-13dda.firebaseapp.com',projectId:'science-academy-13dda',storageBucket:'science-academy-13dda.firebasestorage.app',messagingSenderId:'449626746191',appId:'1:449626746191:web:73885c6bb862a07655293a'};
    if (!firebase.apps.length) firebase.initializeApp(FB);
    db = firebase.firestore();
    firebase.auth().signInAnonymously().then(function(){
      db.doc(FB_PATH).onSnapshot(function(snap){
        if (snap.exists) {
          var d = snap.data();
          if (d.classes) { CLASSES=d.classes; TEACHERS=d.teachers||TEACHERS; masterCodes=d.masterCodes||{}; saveState(); renderAll(); }
        } else { fbSave(); }
      }, function(){});
    }).catch(function(){});
  } catch(e) {}
}

// --- SORT / GROUP ---
function sortList(list, type) {
  return list.slice().sort(function(a,b){
    if (type==='grade') {
      if (a.grade!==b.grade) return a.grade-b.grade;
      var sc = a.school.localeCompare(b.school,'ko');
      if (sc!==0) return sc;
      return (a.name.includes('S')?0:a.name.includes('H')?1:2)-(b.name.includes('S')?0:b.name.includes('H')?1:2);
    }
    var tc = a.teacher.localeCompare(b.teacher,'ko');
    return tc || a.grade-b.grade || a.school.localeCompare(b.school,'ko');
  });
}
function groupBy(list, type) {
  var res = {};
  if (type==='grade') {
    [1,2,3].forEach(function(g){
      var items = sortList(list.filter(function(c){return c.grade===g;}), type);
      if (items.length) res[g+'학년'] = items;
    });
  } else {
    var ts = [];
    list.forEach(function(c){ if (ts.indexOf(c.teacher)<0) ts.push(c.teacher); });
    ts.sort(function(a,b){return a.localeCompare(b,'ko');});
    ts.forEach(function(t){
      var items = sortList(list.filter(function(c){return c.teacher===t;}), type);
      if (items.length) res[t+' 선생님'] = items;
    });
  }
  return res;
}

// --- RENDER ---
function renderAll() { renderManager(); renderTeacher(); renderMaster(); }

function renderGroups(list, mode, containerId) {
  var el = document.getElementById(containerId);
  var groups = groupBy(list, sortState[mode]);
  var keys = Object.keys(groups);
  if (!keys.length) { el.innerHTML = '<div class="no-cards">표시할 반이 없습니다.</div>'; return; }
  var html = '';
  keys.forEach(function(label){
    html += '<div class="group-section"><div class="group-label">'+label+'</div><div class="cards">';
    groups[label].forEach(function(c){ html += buildCard(c, mode); });
    html += '</div></div>';
  });
  el.innerHTML = html;
}

function buildCard(c, mode) {
  var teacherHTML = '';
  if (mode === 'master') {
    teacherHTML = '<div class="t-picker" data-appid="'+c.appId+'">' +
      '<button type="button" class="t-picker-btn" data-appid="'+c.appId+'">' +
        '<span>'+c.teacher+'</span>' +
        '<span class="t-picker-arrow">▼</span>' +
      '</button>' +
      '<div class="t-picker-dropdown" id="drop-'+c.appId+'">';
    TEACHERS.forEach(function(t){
      teacherHTML += '<div class="t-picker-item'+(t===c.teacher?' active':'')+'" data-appid="'+c.appId+'" data-teacher="'+t+'">'+t+'</div>';
    });
    teacherHTML += '</div></div>';
  } else {
    teacherHTML = '<span class="card-teacher">'+c.teacher+' 선생님</span>';
  }

  var footerHTML = mode === 'master'
    ? '<div class="card-footer"><div class="card-grade">'+c.grade+'학년</div></div>'
    : '<div class="card-footer"><div class="card-grade">'+c.grade+'학년</div><div class="card-go-btn">→</div></div>';

  var codeHTML = '';
  if (mode === 'master') {
    codeHTML = '<div class="card-code-section">' +
      '<div class="card-code-row">' +
        '<input class="card-code-input" type="password" id="inp-'+c.appId+'" placeholder="마스터 코드 입력" value="'+(masterCodes[c.appId]||'')+'" maxlength="20"/>' +
        '<button type="button" class="card-code-btn" data-appid="'+c.appId+'">접속 →</button>' +
      '</div>' +
      '<div class="card-saved-tag'+(masterCodes[c.appId]?' show':'')+'" id="saved-'+c.appId+'">✓ 코드 저장됨</div>' +
    '</div>';
  }

  var clickClass = (mode==='manager'||mode==='teacher') ? ' clickable' : '';
  var dataAttr = mode==='manager'
    ? ' data-action="open-site" data-url="'+BASE_URL+c.appId+'/?code='+TEACHER_CODE+'"'
    : mode==='teacher'
    ? ' data-action="open-teacher" data-appid="'+c.appId+'" data-name="'+c.name+'"'
    : '';

  return '<div class="card'+clickClass+'"'+dataAttr+'>' +
    '<div class="card-school">'+c.school+'</div>' +
    '<div class="card-name">'+c.name+'</div>' +
    '<div class="card-teacher-row">'+teacherHTML+'</div>' +
    footerHTML + codeHTML +
  '</div>';
}

function renderManager() { renderGroups(CLASSES, 'manager', 'manager-cards'); }
function renderTeacher() {
  var html = '';
  TEACHERS.forEach(function(t){
    html += '<div class="teacher-btn'+(selectedTeacher===t?' active':'')+'" data-teacher="'+t+'">'+t+'</div>';
  });
  document.getElementById('teacher-btns').innerHTML = html;
  var list = selectedTeacher ? CLASSES.filter(function(c){return c.teacher===selectedTeacher;}) : CLASSES;
  renderGroups(list, 'teacher', 'teacher-cards');
}
function renderMaster() {
  var html = '';
  TEACHERS.forEach(function(t){
    html += '<div class="teacher-tag">'+t+'<button type="button" class="teacher-tag-del" data-teacher="'+t+'">×</button></div>';
  });
  document.getElementById('teacher-manage-list').innerHTML = html;
  renderGroups(CLASSES, 'master', 'master-cards');
}

// --- PICKER ---
function openPicker(appId) {
  closeAllPickers();
  var btn = document.querySelector('.t-picker-btn[data-appid="'+appId+'"]');
  var drop = document.getElementById('drop-'+appId);
  if (!btn || !drop) return;
  // 해당 카드 z-index 올리기
  var card = btn.closest('.card');
  if (card) { card.style.zIndex = '100'; card.style.position = 'relative'; }
  drop.classList.add('open');
  btn.classList.add('open');
  openPickerAppId = appId;
}
function closeAllPickers() {
  document.querySelectorAll('.t-picker-dropdown').forEach(function(d){d.classList.remove('open');});
  document.querySelectorAll('.t-picker-btn').forEach(function(b){b.classList.remove('open');});
  // 모든 카드 z-index 원복
  document.querySelectorAll('#master-cards .card').forEach(function(c){c.style.zIndex='';});
  openPickerAppId = null;
}

// --- MODAL ---
function openModal(appId, name) {
  modalTarget = appId;
  document.getElementById('modal-title').textContent = name;
  document.getElementById('modal-input').value = masterCodes[appId]||'';
  document.getElementById('code-modal').classList.add('show');
  setTimeout(function(){ document.getElementById('modal-input').focus(); }, 100);
}
function closeModal() {
  document.getElementById('code-modal').classList.remove('show');
  modalTarget = null;
}

// --- EVENT LISTENERS (모두 JS로, HTML 인라인 없음) ---

// 모드 탭
['manager','teacher','master'].forEach(function(mode){
  document.getElementById('tab-'+mode).addEventListener('click', function(){
    currentMode = mode;
    document.querySelectorAll('.mode-tab').forEach(function(t){t.classList.remove('active');});
    this.classList.add('active');
    document.querySelectorAll('.mode-panel').forEach(function(p){p.classList.remove('active');});
    document.getElementById('panel-'+mode).classList.add('active');
    renderAll();
  });
});

// 정렬 버튼
[['mg-grade','manager','grade'],['mg-teacher','manager','teacher'],
 ['tc-grade','teacher','grade'],['tc-teacher','teacher','teacher'],
 ['ms-grade','master','grade'],['ms-teacher','master','teacher']].forEach(function(row){
  document.getElementById(row[0]).addEventListener('click', function(){
    sortState[row[1]] = row[2];
    var bar = this.closest('.sort-bar');
    bar.querySelectorAll('.sort-btn').forEach(function(b){b.classList.remove('active');});
    this.classList.add('active');
    renderAll();
  });
});

// 편집 토글
document.getElementById('edit-toggle').addEventListener('click', function(){
  editMode = !editMode;
  this.textContent = editMode ? '✅ 완료' : '✏️ 편집';
  this.classList.toggle('on', editMode);
  document.getElementById('manage-panel').style.display = editMode ? 'block' : 'none';
  renderMaster();
});

// 선생님 추가
document.getElementById('add-teacher-btn').addEventListener('click', function(){
  var input = document.getElementById('add-teacher-input');
  var name = input.value.trim();
  if (!name || TEACHERS.indexOf(name)>=0) { input.focus(); return; }
  TEACHERS.push(name);
  TEACHERS.sort(function(a,b){return a.localeCompare(b,'ko');});
  saveState(); input.value=''; renderAll();
});
document.getElementById('add-teacher-input').addEventListener('keydown', function(e){
  if (e.key==='Enter') document.getElementById('add-teacher-btn').click();
});

// 모달 버튼
document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
document.getElementById('modal-confirm-btn').addEventListener('click', function(){
  var code = document.getElementById('modal-input').value.trim();
  if (!code || !modalTarget) return;
  masterCodes[modalTarget] = code;
  saveState();
  window.open(BASE_URL+modalTarget+'/?code='+code, '_blank');
  closeModal();
});
document.getElementById('modal-input').addEventListener('keydown', function(e){
  if (e.key==='Enter') document.getElementById('modal-confirm-btn').click();
});
document.getElementById('code-modal').addEventListener('click', function(e){
  if (e.target===this) closeModal();
});

// 전체 클릭 위임
document.addEventListener('click', function(e){

  // 선생님 필터 버튼 (담당 탭)
  var teacherBtn = e.target.closest('#teacher-btns .teacher-btn');
  if (teacherBtn) {
    var t = teacherBtn.dataset.teacher;
    selectedTeacher = (selectedTeacher===t) ? null : t;
    renderTeacher();
    return;
  }

  // 선생님 피커 버튼
  var pickerBtn = e.target.closest('.t-picker-btn');
  if (pickerBtn) {
    e.stopPropagation();
    var appId = pickerBtn.dataset.appid;
    if (openPickerAppId===appId) { closeAllPickers(); } else { openPicker(appId); }
    return;
  }

  // 선생님 피커 항목 선택
  var pickerItem = e.target.closest('.t-picker-item');
  if (pickerItem) {
    e.stopPropagation();
    var appId = pickerItem.dataset.appid;
    var newT = pickerItem.dataset.teacher;
    var idx = CLASSES.findIndex(function(c){return c.appId===appId;});
    if (idx>=0) {
      CLASSES[idx] = Object.assign({}, CLASSES[idx], {teacher:newT});
      saveState();
      closeAllPickers();
      renderMaster();
    }
    return;
  }

  // 접속 버튼 (마스터용)
  var codeBtn = e.target.closest('.card-code-btn');
  if (codeBtn) {
    var appId = codeBtn.dataset.appid;
    var inp = document.getElementById('inp-'+appId);
    var code = inp ? inp.value.trim() : '';
    if (!code) { if(inp) inp.focus(); return; }
    masterCodes[appId] = code;
    saveState();
    var saved = document.getElementById('saved-'+appId);
    if (saved) saved.classList.add('show');
    window.open(BASE_URL+appId+'/?code='+code, '_blank');
    return;
  }

  // 선생님 삭제 버튼
  var delBtn = e.target.closest('.teacher-tag-del');
  if (delBtn) {
    var t = delBtn.dataset.teacher;
    if (!confirm('"'+t+'" 선생님을 삭제할까요?')) return;
    TEACHERS = TEACHERS.filter(function(x){return x!==t;});
    saveState(); renderAll();
    return;
  }

  // 카드 클릭 (실장용 - 사이트 열기)
  var card = e.target.closest('.card[data-action="open-site"]');
  if (card) {
    window.open(card.dataset.url, '_blank');
    return;
  }

  // 카드 클릭 (담당 선생님용 - 모달)
  var tCard = e.target.closest('.card[data-action="open-teacher"]');
  if (tCard) {
    openModal(tCard.dataset.appid, tCard.dataset.name);
    return;
  }

  // 피커 외부 클릭 시 닫기
  if (!e.target.closest('.t-picker')) {
    closeAllPickers();
  }
});

// 즉시 렌더링
renderAll();

// Firebase 백그라운드 연결
window.addEventListener('load', function(){
  if (typeof firebase !== 'undefined') fbConnect();
});
</script>
